<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — tabbi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFFF;
      --primary: #1C1C1E;
      --muted: #6B6B70;
      --border: #F0F0F0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--primary);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--primary); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--muted); }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

    .logo {
      font-size: 1.15rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--primary);
    }

    main { padding: 64px 0 96px; }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    .support-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
    }

    .support-card h2 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    .support-card p {
      font-size: 0.9375rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .support-email {
      font-size: 1rem;
      font-weight: 600;
      margin: 16px 0;
    }

    .support-email a {
      text-decoration: none;
    }

    .support-email a:hover {
      text-decoration: underline;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    footer a { text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <a href="index.html" class="logo">tabbi</a>
    </div>
  </header>

  <main>
    <div class="container">
      <h1>Tabbi Support</h1>

      <div class="support-card">
        <h2>Need help?</h2>
        <p>Email us and we’ll get back to you as soon as we can.</p>
        <p class="support-email"><a href="mailto:tabbisupport@gmail.com">tabbisupport@gmail.com</a></p>
        <p>We typically respond within 48 hours.</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <a href="privacy-policy.html">Privacy Policy</a> · <a href="terms-of-use.html">Terms of Use</a> · <a href="index.html">Back to home</a>
    </div>
  </footer>

</body>
</html>
